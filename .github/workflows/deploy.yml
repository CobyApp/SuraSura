name: Deploy to App Store

on:
  push:
    branches:
      - main          # main 푸시 → TestFlight 자동 배포
    tags:
      - 'v*'          # v1.0.0 같은 태그 → App Store 심사 제출

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. 소스 체크아웃 ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xcode 버전 고정 ───────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Ruby + Bundler (fastlane용) ───────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true   # Gemfile.lock 기반 캐시

      # ── 4. Tuist 설치 ────────────────────────────────────────────
      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash
          echo "$HOME/.tuist/bin" >> $GITHUB_PATH

      # ── 5. Tuist 의존성 및 프로젝트 생성 ────────────────────────
      - name: Tuist fetch & generate
        run: |
          tuist install
          tuist generate --no-open

      # ── 6. Secrets.xcconfig 생성 (API 키 주입) ──────────────────
      - name: Create Secrets.xcconfig
        run: |
          echo "GOOGLE_CLOUD_API_KEY=${{ secrets.GOOGLE_CLOUD_API_KEY }}" > Secrets.xcconfig

      # ── 7. 임시 키체인 생성 + 배포 인증서 임포트 ────────────────
      - name: Setup code signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 임시 키체인 생성
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          # 인증서(.p12) 디코딩 & 임포트
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 프로비저닝 프로파일 설치
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a 'UUID' profile.mobileprovision \
            | grep -o '[0-9a-f-]\{36\}' | head -1)
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      # ── 8. App Store Connect API 키 설정 ────────────────────────
      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" \
            | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      # ── 9. main 푸시 → TestFlight ────────────────────────────────
      - name: Deploy to TestFlight
        if: github.ref == 'refs/heads/main'
        run: bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ── 10. 태그(v*) 푸시 → App Store 심사 제출 ─────────────────
      - name: Deploy to App Store
        if: startsWith(github.ref, 'refs/tags/v')
        run: bundle exec fastlane release
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ── 11. 키체인 정리 ──────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
